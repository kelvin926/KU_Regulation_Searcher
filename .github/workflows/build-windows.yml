name: Build Windows Installer

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --x64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ku-regulation-windows-installer
          path: release/*.exe
          if-no-files-found: error
